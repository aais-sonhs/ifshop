{% load static %}
<!DOCTYPE html>
<html lang="vi">
{% include "layout/head.html" %}
<body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">
        {% include "layout/menu.html" %}
        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <!-- Main content -->
            <section class="content" style="padding: 15px;">
                {% block content %}{% endblock %}
            </section>
        </div>
        <!-- /.content-wrapper -->
        {% include "layout/print_preview.html" %}
    </div>
    <!-- ./wrapper -->
    <link rel="stylesheet" href="{% static 'plugins/select2-bootstrap4-theme/select2-bootstrap4.min.css' %}?{% now 'U' %}">
    <script>
    function getSelect2Placeholder($select){
        var explicit = $select.data('placeholder') || $select.attr('placeholder');
        if(explicit) return explicit;
        var firstText = $.trim($select.find('option:first').text());
        return firstText || '-- Chọn --';
    }

    function shouldUseSearchableSelect($select, force){
        if(!$select.length || !$select.is('select')) return false;
        if($select.data('select2') || $select.hasClass('select2-hidden-accessible')) return false;
        if($select.hasClass('no-select2') || $select.data('searchable') === false) return false;
        if($select.hasClass('d-none') || $select.closest('.d-none').length) return false;
        if($select.closest('.dataTables_length, .dt-length').length) return false;
        if(force || $select.hasClass('select2') || $select.data('searchable') === true || $select.prop('multiple')) return true;
        if(!$select.hasClass('form-control') && !$select.hasClass('custom-select')) return false;
        return $select.find('option').length > 6;
    }

    function buildSearchableSelectOptions($select, parentModal){
        var $modal = parentModal ? $(parentModal) : $select.closest('.modal');
        var hasBlankOption = $select.prop('multiple') || $select.find('option:first').val() === '';
        var styleWidth = ($select.attr('style') || '').match(/width\s*:/i);
        var opts = {
            width: $select.data('width') || (styleWidth ? 'style' : '100%'),
            theme: 'bootstrap4',
            placeholder: getSelect2Placeholder($select),
            allowClear: $select.data('allow-clear') !== undefined ? !!$select.data('allow-clear') : hasBlankOption,
            minimumResultsForSearch: 0,
            language: {
                noResults: function(){ return 'Không tìm thấy'; },
                searching: function(){ return 'Đang tìm...'; },
                inputTooShort: function(args){ return 'Nhập thêm ' + (args.minimum - args.input.length) + ' ký tự'; }
            }
        };
        if($modal.length) opts.dropdownParent = $modal;
        return opts;
    }

    function initSearchableSelects(context, force, parentModal){
        if(!$.fn.select2) return;
        var $context = context ? $(context) : $(document);
        var $selects = $context.is('select') ? $context : $context.find('select');
        $selects.each(function(){
            var $select = $(this);
            if(!shouldUseSearchableSelect($select, force)) return;
            $select.select2(buildSearchableSelectOptions($select, parentModal));
        });
    }

    window.initSearchableSelects = initSearchableSelects;
    window.initSelect2 = function(selector, parentModal){
        initSearchableSelects(selector, true, parentModal);
    };

    // Auto init Select2 cho select dài để có thể gõ tìm kiếm trong dropdown.
    $(document).ready(function(){
        if($.fn.select2){
            $.fn.select2.defaults.set('theme', 'bootstrap4');
            $.fn.select2.defaults.set('language', {noResults: function(){return 'Không tìm thấy';}});
            initSearchableSelects(document);

            var selectInitTimer = null;
            var selectObserver = new MutationObserver(function(mutations){
                var touchedSelects = [];
                var shouldScan = false;
                mutations.forEach(function(mutation){
                    if(mutation.target && mutation.target.tagName === 'SELECT'){
                        touchedSelects.push(mutation.target);
                    }
                    if((mutation.type === 'childList' && mutation.addedNodes.length) ||
                        (mutation.target && mutation.target.tagName === 'SELECT')){
                        shouldScan = true;
                    }
                });
                if(!shouldScan) return;
                clearTimeout(selectInitTimer);
                selectInitTimer = setTimeout(function(){
                    if(touchedSelects.length){
                        $(touchedSelects).filter('.select2-hidden-accessible').trigger('change.select2');
                    }
                    initSearchableSelects(document);
                }, 80);
            });
            selectObserver.observe(document.body, {childList: true, subtree: true});
        }

        // Căn giữa cột "Thao tác" trong tất cả các bảng
        function centerThaoTacColumns(){
            $('table thead th').filter(function(){
                return $.trim($(this).text()) === 'Thao tác';
            }).each(function(){
                var colIndex = $(this).index();
                $(this).css('text-align', 'center');
                $(this).closest('table').find('tbody tr').each(function(){
                    $(this).children('td').eq(colIndex).css('text-align', 'center');
                });
            });
        }
        centerThaoTacColumns();

        // Dùng MutationObserver để căn giữa khi dữ liệu bảng được tải động (AJAX)
        $('table tbody').each(function(){
            var observer = new MutationObserver(function(){ centerThaoTacColumns(); });
            observer.observe(this, {childList: true, subtree: true});
        });
    });
    // ===== MONEY FORMAT UTILITY =====
    // Auto-format số có dấu phân cách hàng nghìn khi gõ
    function formatMoneyInput(el){
        $(el).on('input', function(){
            var cursorPos = this.selectionStart;
            var oldLength = this.value.length;
            var raw = this.value.replace(/[^0-9]/g, '');
            if(raw === ''){this.value = '';return;}
            var formatted = Number(raw).toLocaleString('vi-VN');
            this.value = formatted;
            // Adjust cursor position
            var newLength = formatted.length;
            var diff = newLength - oldLength;
            var newPos = cursorPos + diff;
            if(newPos < 0) newPos = 0;
            this.setSelectionRange(newPos, newPos);
        });
    }
    // Lấy giá trị số từ input đã format (bỏ dấu . phân cách)
    function getMoneyValue(selector){
        var val = $(selector).val();
        if(!val) return 0;
        return parseFloat(val.toString().replace(/\./g, '').replace(/,/g, '')) || 0;
    }
    // Set giá trị số vào input có format
    function setMoneyValue(selector, val){
        var num = Math.round(parseFloat(val) || 0);
        $(selector).val(num ? num.toLocaleString('vi-VN') : '0');
    }
    // Auto-init cho tất cả input có class 'money-format'
    $(document).ready(function(){
        $('.money-format').each(function(){ formatMoneyInput(this); });
    });
    // Delegate cho input.money-format được thêm động
    $(document).on('focus', 'input.money-format', function(){
        if(!$(this).data('money-init')){
            formatMoneyInput(this);
            $(this).data('money-init', true);
        }
    });
    </script>
    <script src="{% static 'js/table-scroll.js' %}?{% now 'U' %}" defer></script>
    {% block extra_js %}{% endblock %}

    <!-- PWA Service Worker -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js', {scope: '/'})
                .then(function(reg) { console.log('[PWA] SW registered:', reg.scope); })
                .catch(function(err) { console.log('[PWA] SW failed:', err); });
        });
    }
    </script>
</body>
</html>
