{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-list-alt mr-2"></i>Danh sách phiếu thu chi</h3>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-2">
                <select class="form-control form-control-sm" id="filter_type">
                    <option value="">-- Loại --</option>
                    <option value="thu">Thu</option>
                    <option value="chi">Chi</option>
                </select>
            </div>
            <div class="col-md-2"><input type="date" class="form-control form-control-sm" id="filter_from_date"></div>
            <div class="col-md-2"><input type="date" class="form-control form-control-sm" id="filter_to_date"></div>
            <div class="col-md-2"><button class="btn btn-sm btn-info" id="btn_search"><i class="fas fa-search"></i> Tìm kiếm</button></div>
        </div>
        <div class="table-responsive">
            <table id="data_tbl" class="table table-bordered table-striped table-sm">
                <thead><tr><th>STT</th><th>Loại</th><th>Mã phiếu</th><th>Danh mục</th><th>Đối tượng</th><th>Số tiền</th><th>HTTT</th><th>Ngày</th><th>Quỹ</th><th>Trạng thái</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function fmt(n){return Number(n||0).toLocaleString('vi-VN');}
function fmtDt(dateStr, createdAt){
    if(!dateStr) return '';
    var p = dateStr.split('-');
    var d = p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : dateStr;
    if(createdAt){
        var t = createdAt.split(' ');
        if(t.length===2) d += ' ' + t[1];
    }
    return d;
}
$(document).ready(function(){
    loadData();
    $('#btn_search').click(function(){loadData();});
});
function loadData(){
    var all = [];
    $.when(
        $.get('/api/receipts/'),
        $.get('/api/payments/')
    ).done(function(r1, r2){
        var filterType = $('#filter_type').val();
        var fromDate = $('#filter_from_date').val();
        var toDate = $('#filter_to_date').val();

        if (!filterType || filterType === 'thu') {
            r1[0].data.forEach(function(d){
                d._type = 'Thu'; d._type_class = 'success'; d._date = d.receipt_date; d._target = d.customer;
                all.push(d);
            });
        }
        if (!filterType || filterType === 'chi') {
            r2[0].data.forEach(function(d){
                d._type = 'Chi'; d._type_class = 'danger'; d._date = d.payment_date; d._target = d.target;
                all.push(d);
            });
        }

        // Filter by date
        if (fromDate) { all = all.filter(function(d){ return d._date >= fromDate; }); }
        if (toDate) { all = all.filter(function(d){ return d._date <= toDate; }); }

        // Sort by date desc
        all.sort(function(a,b){ return b._date.localeCompare(a._date); });

        var h = '';
        all.forEach(function(d, i){
            var pmLabel = d.payment_method === 2 ? '🏦 CK' : '💵 TM';
            h += '<tr><td>'+(i+1)+'</td><td><span class="badge badge-'+d._type_class+'">'+d._type+'</span></td>'+
                '<td>'+d.code+'</td><td>'+d.category+'</td><td>'+d._target+'</td>'+
                '<td class="text-right">'+fmt(d.amount)+'</td><td class="text-center">'+pmLabel+'</td><td>'+fmtDt(d._date, d.created_at)+'</td><td>'+d.cash_book+'</td>'+
                '<td>'+d.status_display+'</td></tr>';
        });
        $('#data_tbl tbody').html(h || '<tr><td colspan="10" class="text-center text-muted">Chưa có dữ liệu</td></tr>');
    });
}
</script>
{% endblock %}
