{% extends "base.html" %}
{% load order_format %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-money-bill-wave mr-2"></i>Phiếu chi</h3>
        <div class="card-tools">
            <button type="button" class="btn btn-sm btn-outline-success" id="btn_export_excel"><i class="fas fa-file-excel"></i> Xuất Excel</button>
            <button type="button" class="btn btn-sm btn-primary" id="btn_add"><i class="fas fa-plus"></i> Tạo phiếu chi</button>
        </div>
    </div>
    <div class="card-body">
        <div class="card mb-3" id="payment_filters" style="border-color:#e2e8f0;background:#fafbfc;">
            <div class="card-body p-2">
                <div class="row align-items-end" style="row-gap:6px;">
                    <div class="col-md-4">
                        <label class="small mb-0 text-muted">Tìm kiếm</label>
                        <input type="text" class="form-control form-control-sm" id="f_search" placeholder="Mã phiếu, NCC/KH, phiếu nhập, diễn giải...">
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Từ ngày</label>
                        <input type="date" class="form-control form-control-sm" id="f_date_from">
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Đến ngày</label>
                        <input type="date" class="form-control form-control-sm" id="f_date_to">
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Trạng thái</label>
                        <select class="form-control form-control-sm" id="f_status">
                            <option value="">Tất cả</option>
                            <option value="1">Hoàn thành</option>
                            <option value="0">Nháp</option>
                            <option value="2">Hủy</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Danh mục</label>
                        <select class="form-control form-control-sm" id="f_category">
                            <option value="">Tất cả</option>
                            {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row align-items-end mt-1" style="row-gap:6px;">
                    <div class="col-md-3">
                        <label class="small mb-0 text-muted">Nhà cung cấp</label>
                        <select class="form-control form-control-sm" id="f_supplier">
                            <option value="">Tất cả</option>
                            {% for s in suppliers %}<option value="{{ s.id }}">{{ s.code }} - {{ s.name }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="small mb-0 text-muted">Quỹ/Tài khoản</label>
                        <select class="form-control form-control-sm" id="f_cashbook">
                            <option value="">Tất cả</option>
                            {% for c in cashbooks %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                            <option value="0">Chưa gán</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="small mb-0 text-muted">Phương thức thanh toán</label>
                        <select class="form-control form-control-sm" id="f_method">
                            <option value="">Tất cả</option>
                            {% for m in payment_methods %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="small mb-0 text-muted">Liên kết phiếu nhập</label>
                        <select class="form-control form-control-sm" id="f_goods_receipt_state">
                            <option value="">Tất cả</option>
                            <option value="yes">Có phiếu nhập</option>
                            <option value="no">Không liên kết</option>
                        </select>
                    </div>
                </div>
                <div class="row align-items-end mt-1" style="row-gap:6px;">
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Loại thanh toán</label>
                        <select class="form-control form-control-sm" id="f_payment_type">
                            <option value="">Tất cả</option>
                            <option value="1">Tiền mặt</option>
                            <option value="2">Chuyển khoản</option>
                            <option value="3">Khác</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Số tiền từ</label>
                        <input type="number" class="form-control form-control-sm" id="f_amount_from" min="0" placeholder="0">
                    </div>
                    <div class="col-md-2">
                        <label class="small mb-0 text-muted">Số tiền đến</label>
                        <input type="number" class="form-control form-control-sm" id="f_amount_to" min="0" placeholder="∞">
                    </div>
                    {% if has_multiple_stores %}
                    <div class="col-md-3">
                        <label class="small mb-0 text-muted">Cửa hàng</label>
                        <select class="form-control form-control-sm" id="f_store">
                            <option value="">Tất cả cửa hàng</option>
                            {% for store in stores %}<option value="{{ store.id }}">{{ store.name }}</option>{% endfor %}
                        </select>
                    </div>
                    {% endif %}
                    <div class="{% if has_multiple_stores %}col-md-3{% else %}col-md-6{% endif %}">
                        <div class="d-flex justify-content-end" style="gap:6px;">
                            <button type="button" class="btn btn-sm btn-primary" id="btn_apply_filters"><i class="fas fa-search mr-1"></i>Lọc</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" id="btn_clear_filters"><i class="fas fa-times mr-1"></i>Xóa lọc</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-2" style="gap:8px;">
            <div id="payment_pagination_summary" class="text-muted small"></div>
            <div class="d-flex align-items-center flex-wrap" style="gap:8px;">
                <label for="payment_page_size" class="small text-muted mb-0">Hiển thị</label>
                <select id="payment_page_size" class="form-control form-control-sm" style="width:auto;min-width:86px;">
                    <option value="25">25 dòng</option>
                    <option value="50">50 dòng</option>
                    <option value="100">100 dòng</option>
                    <option value="200">200 dòng</option>
                </select>
            </div>
        </div>
        <div class="table-responsive">
            <table id="data_tbl" class="table table-bordered table-striped table-sm">
                <thead><tr><th>STT</th><th>Mã phiếu</th><th>Danh mục</th><th>NCC/KH</th><th>Phiếu nhập</th><th>Số tiền</th><th>HTTT</th><th>Ngày chi</th><th>Quỹ</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="payment_pagination" class="d-flex justify-content-end flex-wrap mt-2" style="gap:6px;"></div>
    </div>
</div>
<div class="modal fade" id="modal_form" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modal_title">Tạo phiếu chi</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_id">
                <div class="row">
                    <div class="col-md-6"><div class="form-group"><label>Mã phiếu <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="inp_code"></div></div>
                    <div class="col-md-6"><div class="form-group"><label>Danh mục</label><select class="form-control form-control-sm" id="inp_category_id"><option value="">-- Chọn --</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div></div>
                </div>
                <div class="row">
                    <div class="col-md-6"><div class="form-group"><label>Nhà cung cấp</label><select class="form-control form-control-sm select2" id="inp_supplier_id"><option value="">-- Chọn --</option>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.code }} - {{ s.name }}</option>{% endfor %}</select></div></div>
                    <div class="col-md-6"><div class="form-group"><label>Phiếu nhập hàng</label><select class="form-control form-control-sm select2" id="inp_goods_receipt_id"><option value="">-- Không liên kết --</option>{% for g in goods_receipts %}<option value="{{ g.id }}" data-amount="{{ g.total_amount }}">{{ g.code }} - {{ g.supplier__name|default:"" }} ({{ g.total_amount|money_vnd }}đ)</option>{% endfor %}</select></div></div>
                </div>
                <div class="row">
                    <div class="col-md-6"><div class="form-group"><label>Quỹ</label><select class="form-control form-control-sm" id="inp_cash_book_id"><option value="">-- Chọn --</option>{% for c in cashbooks %}<option value="{{ c.id }}" data-balance="{{ c.balance }}">{{ c.name }}</option>{% endfor %}</select><small class="text-muted" id="lbl_balance"></small></div></div>
                    <div class="col-md-6"><div class="form-group"><label>Số tiền <span class="text-danger">*</span></label><input type="number" class="form-control form-control-sm" id="inp_amount" value="0"></div></div>
                </div>
                <div class="row">
                    <div class="col-md-4"><div class="form-group"><label>Ngày chi <span class="text-danger">*</span></label><input type="date" class="form-control form-control-sm" id="inp_payment_date"></div></div>
                    <div class="col-md-4"><div class="form-group"><label>Hình thức TT</label><select class="form-control form-control-sm" id="inp_payment_method">{% for m in payment_methods %}<option value="{{ m.id }}" data-legacy-type="{{ m.legacy_type }}" data-default-cash-book-id="{{ m.default_cash_book_id|default:'' }}">{{ m.name }}</option>{% endfor %}</select></div></div>
                    <div class="col-md-4"><div class="form-group"><label>Trạng thái</label><select class="form-control form-control-sm" id="inp_status"><option value="0">Nháp</option><option value="1">Hoàn thành</option><option value="2">Hủy</option></select></div></div>
                </div>
                <div class="form-group"><label>Diễn giải</label><textarea class="form-control form-control-sm" id="inp_description" rows="2"></textarea></div>
                <div class="form-group"><label>Ghi chú</label><textarea class="form-control form-control-sm" id="inp_note" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btn_save"><i class="fas fa-save"></i> Lưu</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function fmt(n){return Number(n||0).toLocaleString('vi-VN');}
function fmtD(n){return fmt(n) + 'đ';}
var PAYMENT_PAGE_SIZE_KEY = 'ifshop_payment_page_size';
var PAYMENT_PAGE_STATE = {
    page: 1,
    page_size: (function(){
        var saved = parseInt(localStorage.getItem(PAYMENT_PAGE_SIZE_KEY) || '50', 10);
        return [25, 50, 100, 200].indexOf(saved) >= 0 ? saved : 50;
    })(),
    meta: null
};
var PAYMENT_NEXT_CODE = '';
function getPaymentFilters(){
    return {
        search: ($('#f_search').val() || '').trim(),
        date_from: $('#f_date_from').val() || '',
        date_to: $('#f_date_to').val() || '',
        status: $('#f_status').val() || '',
        category_id: $('#f_category').val() || '',
        supplier_id: $('#f_supplier').val() || '',
        cash_book_id: $('#f_cashbook').val() || '',
        payment_method_option_id: $('#f_method').val() || '',
        goods_receipt_state: $('#f_goods_receipt_state').val() || '',
        payment_type: $('#f_payment_type').val() || '',
        amount_from: $('#f_amount_from').val() || '',
        amount_to: $('#f_amount_to').val() || '',
        store_id: $('#f_store').val() || ''
    };
}
function getPaymentRequestParams(includePagination){
    var filters = getPaymentFilters();
    var params = {};
    Object.keys(filters).forEach(function(key){
        if(filters[key] !== '') params[key] = filters[key];
    });
    if(includePagination){
        params.page = PAYMENT_PAGE_STATE.page || 1;
        params.page_size = PAYMENT_PAGE_STATE.page_size || 50;
    }
    return params;
}
function buildPaymentExportUrl(){
    var query = $.param(getPaymentRequestParams(false));
    return '/api/payments/export-excel/' + (query ? '?' + query : '');
}
$(document).ready(function(){
    $('#payment_page_size').val(String(PAYMENT_PAGE_STATE.page_size));
    loadData();

    // Hiển thị số dư khi chọn quỹ
    $('#inp_cash_book_id').change(function(){
        var $opt = $(this).find('option:selected');
        var bal = $opt.data('balance');
        if($(this).val()){
            var balClass = bal < 0 ? 'text-danger font-weight-bold' : 'text-success';
            $('#lbl_balance').html('Số dư: <span class="'+balClass+'">'+fmt(bal)+'đ</span>');
        } else {
            $('#lbl_balance').html('');
        }
    });

    // Khi chọn phiếu nhập hàng → tự động điền số tiền
    $('#inp_goods_receipt_id').change(function(){
        var $opt = $(this).find('option:selected');
        var amount = $opt.data('amount');
        if(amount){
            $('#inp_amount').val(amount);
        }
    });

    $('#btn_add').click(function(){
        $('#edit_id').val('');$('#inp_description,#inp_note').val('');$('#inp_amount').val(0);
        $('#inp_category_id,#inp_cash_book_id,#inp_supplier_id,#inp_goods_receipt_id').val('').trigger('change');
        // Tự động điền ngày hôm nay
        var today = new Date().toISOString().split('T')[0];
        $('#inp_payment_date').val(today);
        $('#inp_status').val('0');$('#inp_payment_method').val('2');
        $('#inp_code').val(PAYMENT_NEXT_CODE || '');
        $('#modal_title').text('Tạo phiếu chi');$('#modal_form').modal('show');
    });
    $('#btn_save').click(function(){
        var $methodOpt = $('#inp_payment_method option:selected');
        var data={id:$('#edit_id').val()||null,code:$('#inp_code').val(),category_id:$('#inp_category_id').val(),
            cash_book_id:$('#inp_cash_book_id').val(),supplier_id:$('#inp_supplier_id').val(),
            goods_receipt_id:$('#inp_goods_receipt_id').val(),
            amount:$('#inp_amount').val(),
            payment_date:$('#inp_payment_date').val(),description:$('#inp_description').val(),
            status:parseInt($('#inp_status').val()),payment_method:parseInt($methodOpt.data('legacy-type'))||2,
            payment_method_option_id:$methodOpt.val()||null,note:$('#inp_note').val()};
        if(!data.payment_date){alert('Vui lòng nhập ngày chi');return;}
        $.ajax({url:'/api/payments/save/',type:'POST',contentType:'application/json',
            headers:{'X-CSRFToken':'{{csrf_token}}'},data:JSON.stringify(data),
            success:function(r){if(r.status==='ok'){$('#modal_form').modal('hide');if(!data.id) resetPaymentPage();loadData();}alert(r.message);}
        });
    });

    $('#payment_page_size').change(function(){
        PAYMENT_PAGE_STATE.page_size = parseInt($(this).val() || '50', 10) || 50;
        localStorage.setItem(PAYMENT_PAGE_SIZE_KEY, String(PAYMENT_PAGE_STATE.page_size));
        resetPaymentPage();
        loadData();
    });

    $('#btn_apply_filters').click(function(){
        resetPaymentPage();
        loadData();
    });
    $('#payment_filters input').on('keydown', function(event){
        if(event.key === 'Enter'){
            event.preventDefault();
            resetPaymentPage();
            loadData();
        }
    });
    $('#btn_clear_filters').click(function(){
        $('#f_search, #f_date_from, #f_date_to, #f_amount_from, #f_amount_to').val('');
        $('#f_status, #f_category, #f_supplier, #f_cashbook, #f_method, #f_goods_receipt_state, #f_payment_type, #f_store').val('');
        resetPaymentPage();
        loadData();
    });
    $('#btn_export_excel').click(function(){
        window.location.href = buildPaymentExportUrl();
    });

    $(document).on('click', '.payment-page-btn', function(){
        if($(this).prop('disabled')) return;
        var page = parseInt($(this).data('page'), 10);
        if(!page || page < 1 || page === PAYMENT_PAGE_STATE.page) return;
        PAYMENT_PAGE_STATE.page = page;
        loadData();
    });
});
function fmtDt(dateStr, createdAt){
    if(!dateStr) return '';
    var p = dateStr.split('-');
    var d = p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : dateStr;
    if(createdAt){
        var t = createdAt.split(' ');
        if(t.length===2) d += ' ' + t[1];
    }
    return d;
}
function resetPaymentPage(){
    PAYMENT_PAGE_STATE.page = 1;
}
function renderPaymentPagination(meta){
    meta = meta || {};
    var totalFiltered = Number(meta.total_filtered_count || 0);
    var totalAll = Number(meta.total_all_count || totalFiltered);
    var currentPage = Number(meta.page || 1);
    var totalPages = Number(meta.total_pages || 1);
    var startIndex = Number(meta.start_index || 0);
    var endIndex = Number(meta.end_index || 0);

    if(totalFiltered === 0){
        var emptyText = totalAll > 0 ? 'Không có phiếu chi phù hợp bộ lọc.' : 'Chưa có phiếu chi.';
        $('#payment_pagination_summary').html('<span class="text-muted small">' + emptyText + '</span>');
        $('#payment_pagination').html('');
        return;
    }

    $('#payment_pagination_summary').html(
        '<span>Hiển thị <strong>' + startIndex + '-' + endIndex + '</strong> / <strong>' + totalFiltered + '</strong> phiếu chi' +
        (totalFiltered !== totalAll ? ' trên tổng <strong>' + totalAll + '</strong>' : '') +
        ' · Trang <strong>' + currentPage + '/' + totalPages + '</strong></span>'
    );

    if(totalPages <= 1){
        $('#payment_pagination').html('');
        return;
    }

    var pages = [1];
    for(var page = Math.max(2, currentPage - 2); page <= Math.min(totalPages - 1, currentPage + 2); page++){
        pages.push(page);
    }
    if(totalPages > 1) pages.push(totalPages);
    pages = pages.filter(function(page, index, arr){
        return arr.indexOf(page) === index;
    }).sort(function(a, b){ return a - b; });

    var html = '';
    html += '<button type="button" class="btn btn-sm btn-outline-secondary payment-page-btn" data-page="' + (currentPage - 1) + '"' + (currentPage <= 1 ? ' disabled' : '') + '>Trước</button>';
    var previousPage = 0;
    pages.forEach(function(page){
        if(previousPage && page - previousPage > 1){
            html += '<span class="btn btn-sm btn-light disabled">...</span>';
        }
        html += '<button type="button" class="btn btn-sm ' + (page === currentPage ? 'btn-primary active' : 'btn-outline-primary') + ' payment-page-btn" data-page="' + page + '">' + page + '</button>';
        previousPage = page;
    });
    html += '<button type="button" class="btn btn-sm btn-outline-secondary payment-page-btn" data-page="' + (currentPage + 1) + '"' + (currentPage >= totalPages ? ' disabled' : '') + '>Sau</button>';
    $('#payment_pagination').html(html);
}
function loadData(){
    $.get('/api/payments/', getPaymentRequestParams(true), function(res){
        PAYMENT_PAGE_STATE.meta = res.meta || {};
        PAYMENT_PAGE_STATE.page = Number((res.meta && res.meta.page) || PAYMENT_PAGE_STATE.page || 1);
        PAYMENT_PAGE_STATE.page_size = Number((res.meta && res.meta.page_size) || PAYMENT_PAGE_STATE.page_size || 50);
        PAYMENT_NEXT_CODE = (res.meta && res.meta.next_code) || res.next_code || PAYMENT_NEXT_CODE || '';
        $('#payment_page_size').val(String(PAYMENT_PAGE_STATE.page_size));
        var h='';
        var startIndex = Number((res.meta && res.meta.start_index) || 1);
        res.data.forEach(function(d,i){
            var grBadge = d.goods_receipt ? '<span class="badge badge-info">'+d.goods_receipt+'</span>' : '';
            var pmLabel = d.payment_method_display || (d.payment_method === 2 ? '🏦 CK' : '💵 TM');
            h+='<tr><td>'+(startIndex+i)+'</td><td>'+d.code+'</td><td>'+d.category+'</td><td>'+d.target+'</td>'+
                '<td>'+grBadge+'</td>'+
                '<td class="text-right">'+fmtD(d.amount)+'</td><td class="text-center">'+pmLabel+'</td><td>'+fmtDt(d.payment_date, d.created_at)+'</td><td>'+d.cash_book+'</td>'+
                '<td>'+d.status_display+'</td>'+
                '<td><div class="btn-action-group"><button class="btn btn-xs btn-info" onclick=\'editItem('+JSON.stringify(d).replace(/\'/g,"&#39;")+ ')\'>Sửa</button> '+
                '<button class="btn btn-xs btn-outline-danger" onclick="deleteItem('+d.id+')">Xóa</button></div></td></tr>';
        });$('#data_tbl tbody').html(h||'<tr><td colspan="11" class="text-center text-muted">Chưa có dữ liệu</td></tr>');
        renderPaymentPagination(res.meta || {});
    }).fail(function(){
        $('#data_tbl tbody').html('<tr><td colspan="11" class="text-center text-danger">Không tải được danh sách phiếu chi.</td></tr>');
        $('#payment_pagination_summary').html('<span class="text-danger small">Không tải được dữ liệu.</span>');
        $('#payment_pagination').html('');
    });
}
function editItem(d){
    $('#edit_id').val(d.id);$('#inp_code').val(d.code);$('#inp_category_id').val(d.category_id);
    $('#inp_cash_book_id').val(d.cash_book_id);$('#inp_supplier_id').val(d.supplier_id).trigger('change.select2');
    $('#inp_goods_receipt_id').val(d.goods_receipt_id).trigger('change.select2');
    $('#inp_amount').val(d.amount);$('#inp_payment_date').val(d.payment_date);
    $('#inp_description').val(d.description);$('#inp_status').val(d.status);$('#inp_payment_method').val(d.payment_method_option_id || '');$('#inp_note').val(d.note);
    $('#modal_title').text('Sửa phiếu chi');$('#modal_form').modal('show');
}
function deleteItem(id){
    if(!confirm('Bạn có chắc muốn xóa?'))return;
    $.ajax({url:'/api/payments/delete/',type:'POST',contentType:'application/json',
        headers:{'X-CSRFToken':'{{csrf_token}}'},data:JSON.stringify({id:id}),
        success:function(r){loadData();alert(r.message);}
    });
}
</script>
{% endblock %}
