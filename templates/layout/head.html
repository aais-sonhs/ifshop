{% load static %}
<head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="theme-color" content="#0ea5e9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="POS">

    <title>Quản lý Bán hàng</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="{% static 'img/pwa-icon-192.png' %}">

    <!-- Font Awesome Icons -->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/images/favicon.ico'  %}">
    <link
        rel="stylesheet"
        href="{% static 'plugins/fontawesome-free/css/all.min.css' %}?{% now "U" %}"
    />
    <!-- overlayScrollbars -->
    <link
        rel="stylesheet"
        href="{% static 'plugins/overlayScrollbars/css/OverlayScrollbars.min.css' %}?{% now "U" %}"
    />
    <!-- DataTables -->
    <link
        rel="stylesheet"
        href="{% static 'plugins/datatables-bs4/css/dataTables.bootstrap4.css' %}?{% now "U" %}"
    />
    <!-- Theme style -->
    <link rel="stylesheet" href="{% static  'dist/css/adminlte.css'  %}?{% now "U" %}" />
    <!-- Google Font: Source Sans Pro -->
    <link
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700"
        rel="stylesheet"
    />

    <!-- REQUIRED SCRIPTS -->
    <!-- jQuery -->
    <script src="{% static 'plugins/jquery/jquery.min.js' %}?{% now "U" %}"></script>
    <!-- Bootstrap -->
    <script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}?{% now "U" %}"></script>
    <!-- DataTables -->
    <script src="{% static 'plugins/datatables/jquery.dataTables.js' %}?{% now "U" %}"></script>
    <script src="{% static 'plugins/datatables-bs4/js/dataTables.bootstrap4.js' %}?{% now "U" %}"></script>    
    <!-- overlayScrollbars -->
    <script src="{% static 'plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js' %}?{% now "U" %}"></script>
    <link rel="stylesheet" href="{% static 'plugins/datetimepicker-master/build/jquery.datetimepicker.min.css' %}?{% now "U" %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?{% now "U" %}">
    <!-- AdminLTE App -->
    <script src="{% static 'dist/js/adminlte.js' %}?{% now "U" %}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- html2pdf.js for PDF download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Chart.js for reports -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Modern Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Twin Theme CSS -->
    <link rel="stylesheet" href="{% static 'dist/css/twin-theme.css' %}?{% now "U" %}" />
    <style>
        .content-wrapper,
        .content-wrapper > .content,
        .content {
            min-width: 0;
        }

        @media (max-width: 767.98px) {
            .content-wrapper > .content {
                padding: 12px !important;
            }

            .card-header {
                display: flex;
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 10px;
            }

            .card-header::after {
                display: none;
            }

            .card-title {
                float: none !important;
                margin-bottom: 0;
            }

            .card-tools {
                float: none !important;
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-left: auto;
                justify-content: flex-end;
            }

            .card-tools > * {
                margin-left: 0 !important;
            }

            .content-header h1,
            .card-title {
                word-break: break-word;
            }

            .table-responsive {
                -webkit-overflow-scrolling: touch;
            }
        }

        @media (max-width: 575.98px) {
            .content-wrapper > .content {
                padding: 10px !important;
            }

            .card-tools {
                width: 100%;
                margin-left: 0;
                justify-content: flex-start;
            }
        }
    </style>
</head>
