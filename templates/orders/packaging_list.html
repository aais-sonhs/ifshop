{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-box mr-2"></i>Quản lý đóng gói</h3>
        <div class="card-tools">
            <button type="button" class="btn btn-sm btn-primary" id="btn_add"><i class="fas fa-plus"></i> Tạo đóng gói</button>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table id="data_tbl" class="table table-bordered table-striped table-sm">
                <thead><tr><th>STT</th><th>Mã đóng gói</th><th>Đơn hàng</th><th>Trọng lượng (kg)</th><th>Người đóng gói</th><th>Trạng thái</th><th>Thời gian</th><th>Ghi chú</th><th>Thao tác</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modal_form" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modal_title">Tạo đóng gói</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_id">
                <div class="form-group">
                    <label>Mã đóng gói <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inp_code">
                </div>
                <div class="form-group">
                    <label>Đơn hàng <span class="text-danger">*</span></label>
                    <select class="form-control select2" id="inp_order_id">
                        <option value="">-- Chọn đơn hàng --</option>
                        {% for o in orders %}
                        <option value="{{ o.id }}">{{ o.code }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Trọng lượng (kg)</label>
                            <input type="number" class="form-control" id="inp_weight" value="0" step="0.01">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select class="form-control" id="inp_status">
                                <option value="0">Chờ đóng gói</option>
                                <option value="1">Đang đóng gói</option>
                                <option value="2">Hoàn thành</option>
                                <option value="3">Hủy</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Thời gian đóng gói</label>
                    <input type="datetime-local" class="form-control" id="inp_packed_at">
                </div>
                <div class="form-group">
                    <label>Ghi chú</label>
                    <textarea class="form-control" id="inp_note" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btn_save"><i class="fas fa-save"></i> Lưu</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function(){
    loadData();

    $('#btn_add').click(function(){
        $('#edit_id').val('');
        $('#inp_code,#inp_note').val('');
        $('#inp_order_id').val('');
        $('#inp_weight').val(0);
        $('#inp_status').val('0');
        $('#inp_packed_at').val('');
        $('#modal_title').text('Tạo đóng gói');
        $('#modal_form').modal('show');
    });

    $('#btn_save').click(function(){
        var data = {
            id: $('#edit_id').val() || null,
            code: $('#inp_code').val(),
            order_id: $('#inp_order_id').val(),
            weight: parseFloat($('#inp_weight').val()) || 0,
            status: parseInt($('#inp_status').val()),
            packed_at: $('#inp_packed_at').val(),
            note: $('#inp_note').val()
        };
        if(!data.code){alert('Vui lòng nhập mã đóng gói');return;}
        if(!data.order_id){alert('Vui lòng chọn đơn hàng');return;}

        $.ajax({
            url: '/api/packagings/save/', type: 'POST',
            contentType: 'application/json',
            headers: {'X-CSRFToken': '{{csrf_token}}'},
            data: JSON.stringify(data),
            success: function(r){
                if(r.status === 'ok'){ $('#modal_form').modal('hide'); loadData(); }
                alert(r.message);
            }
        });
    });
});

function loadData(){
    $.get('/api/packagings/', function(res){
        var h = '';
        res.data.forEach(function(d, i){
            var statusClass = {'0':'secondary','1':'info','2':'success','3':'danger'}[d.status] || 'secondary';
            h += '<tr><td>'+(i+1)+'</td><td>'+d.code+'</td><td>'+d.order+'</td><td>'+d.weight+'</td>'+
                '<td>'+d.packed_by+'</td>'+
                '<td><span class="badge badge-'+statusClass+'">'+d.status_display+'</span></td>'+
                '<td>'+d.packed_at_display+'</td><td>'+d.note+'</td>'+
                '<td><div class="btn-action-group"><button class="btn btn-xs btn-info" onclick=\'editItem('+JSON.stringify(d).replace(/\'/g,"&#39;")+ ')\'>Sửa</button> '+
                '<button class="btn btn-xs btn-outline-danger" onclick="deleteItem('+d.id+')">Xóa</button></div></td></tr>';
        });
        $('#data_tbl tbody').html(h || '<tr><td colspan="9" class="text-center text-muted">Chưa có dữ liệu</td></tr>');
    });
}

function editItem(d){
    $('#edit_id').val(d.id);
    $('#inp_code').val(d.code);
    $('#inp_order_id').val(d.order_id);
    $('#inp_weight').val(d.weight);
    $('#inp_status').val(d.status);
    $('#inp_packed_at').val(d.packed_at);
    $('#inp_note').val(d.note);
    $('#modal_title').text('Sửa đóng gói');
    $('#modal_form').modal('show');
}

function deleteItem(id){
    if(!confirm('Bạn có chắc muốn xóa?')) return;
    $.ajax({
        url: '/api/packagings/delete/', type: 'POST',
        contentType: 'application/json',
        headers: {'X-CSRFToken': '{{csrf_token}}'},
        data: JSON.stringify({id: id}),
        success: function(r){ loadData(); alert(r.message); }
    });
}
</script>
{% endblock %}
