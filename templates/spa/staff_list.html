{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-user-md mr-2"></i>Nhân viên / KTV</h3>
        <div class="card-tools"><button type="button" class="btn btn-sm btn-primary" id="btn_add"><i class="fas fa-plus"></i> Thêm</button></div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table id="data_tbl" class="table table-bordered table-striped table-sm">
                <thead><tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>SĐT</th><th>Chức vụ</th><th>% HH</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modal_form" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modal_title">Thêm nhân viên</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_id">
                <div class="row">
                    <div class="col-md-6"><div class="form-group"><label>Mã NV <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="inp_code"></div></div>
                    <div class="col-md-6"><div class="form-group"><label>Họ tên <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="inp_name"></div></div>
                </div>
                <div class="row">
                    <div class="col-md-4"><div class="form-group"><label>SĐT</label><input type="text" class="form-control form-control-sm" id="inp_phone"></div></div>
                    <div class="col-md-4"><div class="form-group"><label>Chức vụ</label><select class="form-control form-control-sm" id="inp_position"><option value="1">Kỹ thuật viên</option><option value="2">Quản lý</option><option value="3">Lễ tân</option></select></div></div>
                    <div class="col-md-4"><div class="form-group"><label>% Hoa hồng</label><input type="number" class="form-control form-control-sm" id="inp_commission" value="0" step="0.5" min="0" max="100"></div></div>
                </div>
                <div class="form-group"><label>Ghi chú</label><textarea class="form-control form-control-sm" id="inp_note" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btn_save"><i class="fas fa-save"></i> Lưu</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function fmt(n){return Number(n||0).toLocaleString('vi-VN');}

$(document).ready(function(){
    loadData();
    $('#btn_add').click(function(){
        $('#edit_id').val('');$('#inp_code,#inp_name,#inp_phone,#inp_note').val('');
        $('#inp_position').val(1);$('#inp_commission').val(0);
        $('#modal_title').text('Thêm nhân viên');$('#modal_form').modal('show');
    });
    $('#btn_save').click(function(){
        if(!$('#inp_code').val()||!$('#inp_name').val()){alert('Nhập mã và tên NV');return;}
        $.ajax({url:'/api/spa/staff/save/',type:'POST',contentType:'application/json',
            headers:{'X-CSRFToken':'{{csrf_token}}'},
            data:JSON.stringify({id:$('#edit_id').val()||null,code:$('#inp_code').val(),name:$('#inp_name').val(),
                phone:$('#inp_phone').val(),position:parseInt($('#inp_position').val()),
                commission_rate:parseFloat($('#inp_commission').val())||0,note:$('#inp_note').val()}),
            success:function(r){if(r.status==='ok'){$('#modal_form').modal('hide');loadData();}alert(r.message);}
        });
    });
});
function loadData(){
    $.get('/api/spa/staff/',function(res){
        var h='';
        res.data.forEach(function(d,i){
            var statusBadge=d.is_active?'<span class="badge badge-success">Đang làm</span>':'<span class="badge badge-secondary">Nghỉ</span>';
            h+='<tr><td>'+(i+1)+'</td><td>'+d.code+'</td><td><b>'+d.name+'</b></td><td>'+d.phone+'</td>'+
                '<td>'+d.position_display+'</td><td class="text-center">'+d.commission_rate+'%</td><td class="text-center">'+statusBadge+'</td>'+
                '<td class="text-center"><div class="btn-action-group"><button class="btn btn-xs btn-info" onclick=\'editItem('+JSON.stringify(d)+')\'>Sửa</button> '+
                '<button class="btn btn-xs btn-outline-danger" onclick="deleteItem('+d.id+')">Xóa</button></div></td></tr>';
        });
        $('#data_tbl tbody').html(h||'<tr><td colspan="8" class="text-center text-muted">Chưa có dữ liệu</td></tr>');
    });
}
function editItem(d){
    $('#edit_id').val(d.id);$('#inp_code').val(d.code);$('#inp_name').val(d.name);
    $('#inp_phone').val(d.phone);$('#inp_position').val(d.position);$('#inp_commission').val(d.commission_rate);$('#inp_note').val(d.note);
    $('#modal_title').text('Sửa nhân viên');$('#modal_form').modal('show');
}
function deleteItem(id){
    if(!confirm('Xóa nhân viên này?'))return;
    $.ajax({url:'/api/spa/staff/delete/',type:'POST',contentType:'application/json',
        headers:{'X-CSRFToken':'{{csrf_token}}'},data:JSON.stringify({id:id}),
        success:function(r){loadData();alert(r.message);}});
}
</script>
{% endblock %}
