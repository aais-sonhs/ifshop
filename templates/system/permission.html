{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-key mr-2"></i>Phân quyền</h3>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4">
                <select class="form-control" id="select_role">
                    <option value="">-- Chọn nhóm vai trò --</option>
                </select>
            </div>
        </div>
        <div class="table-responsive">
            <table id="permission_tbl" class="table table-bordered table-sm">
                <thead>
                    <tr>
                        <th>Module</th>
                        <th class="text-center">Xem</th>
                        <th class="text-center">Thêm</th>
                        <th class="text-center">Sửa</th>
                        <th class="text-center">Xóa</th>
                        <th class="text-center">Xuất</th>
                        <th class="text-center">Duyệt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Quản lý đơn hàng</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="orders" data-action="approve"></td>
                    </tr>
                    <tr>
                        <td>Quản lý sản phẩm</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="products" data-action="approve"></td>
                    </tr>
                    <tr>
                        <td>Quản lý khách hàng</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="customers" data-action="approve"></td>
                    </tr>
                    <tr>
                        <td>Thu chi</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="finance" data-action="approve"></td>
                    </tr>
                    <tr>
                        <td>Báo cáo</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="reports" data-action="approve"></td>
                    </tr>
                    <tr>
                        <td>Quản lý hệ thống</td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="view"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="add"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="edit"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="delete"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="export"></td>
                        <td class="text-center"><input type="checkbox" style="transform: scale(1.5); cursor: pointer;" data-module="system" data-action="approve"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button class="btn btn-primary mt-3" id="btn_save_permission">
            <i class="fas fa-save"></i> Lưu phân quyền
        </button>
    </div>
</div>
{% endblock %}
